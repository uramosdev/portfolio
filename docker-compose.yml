version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=change_me_in_production
      - JWT_REFRESH_SECRET=change_me_too_in_production
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
    volumes:
      - ./database.sqlite:/app/database.sqlite
